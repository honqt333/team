  # =====================================================================
  # Track E — Multi-Tenant Hardening (backend-dev)
  # =====================================================================
  - id: track-e-multitenant
    title: 'مسار E — Multi-Tenant: scope 35 models + contract tests'
    assigned_to: backend-dev
    verified_by: [code-reviewer-carag, tester-carag]
    max_retries: 2
    prompt: |-
      أنت Track E في Phase 1 من خطة "World-Class Transformation" لـ Carag V2.

      **النطاق الخاص بك فقط:**
      - app/Models/*.php         (تحسينات tenant scoping فقط)
      - app/Models/Concerns/     (trait جديد إذا لزم)
      - tests/Feature/TenantIsolation/ (جديد)
      - database/factories/      (تحسينات فقط — tenant_id في factories الناقصة)

      **الـ Basline:** يوجد 35 model unscoped حسب audit المرحلة 1.

      **المطلوب:**

      ### 1. Audit & Categorize
      أولاً: أنشئ `docs/multitenant/audit.md` يحوي قائمة الـ 35 model unscoped مع:
      - لماذا unscoped (هل هو global config / currency / etc.)
      - هل يجب أن يكون scoped (multi-tenant data isolation)
      - خطة العلاج لكل model

      ### 2. Enforce Tenant Scope
      لكل model يحتاج scoping:
      - أضف `use BelongsToTenant` trait (موجود بالفعل في المشروع — استخدم الـ trait المستخدم حالياً)
      - أو أضف explicit `tenant_id` column + scope مخصص إذا الـ trait لا يصلح
      - تأكد من `unique()` constraint يشمل `tenant_id` (لتجنب cross-tenant collisions)

      ### 3. Contract Tests
      `tests/Feature/TenantIsolation/` أنشئ tests لكل model scoped:
      ```php
      class SupplierTenantIsolationTest extends TestCase {
          public function test_supplier_cannot_leak_across_tenants(): void {
              $tenantA = Tenant::factory()->create();
              $tenantB = Tenant::factory()->create();
              // ... verify supplier created in A is NOT visible in B
          }
      }
      ```

      الحد الأدنى: 10 Feature tests تغطي أهم models (Supplier, Part, Customer, Vehicle, WorkOrder, Invoice, Payment, Employee, etc.)

      ### 4. Factory Updates
      في كل factory ناقص، أضف tenant_id (إذا الـ model يحتاج tenant).

      **معايير النجاح:**
      - [ ] docs/multitenant/audit.md مع قائمة الـ 35 model
      - [ ] كل الـ 35 model إما scoped أو موثّق سبب عدم الـ scoping
      - [ ] ≥ 10 Feature tests للـ tenant isolation
      - [ ] `php artisan test --testsuite=Feature --filter=Tenant` ينجح
      - [ ] لا regression في باقي الـ tests: `php artisan test` نفس عدد passing أو أكثر

      **Output النهائي:**
      - audit.md بقائمة الـ 35 model
      - ملف بحالة كل model (scoped/refused/reason)
      - test output summary
      - commit/message جاهز للـ PR

    verify_prompt: |-
      أنت code-reviewer-carag و tester-carag تراجعان Track E (Multi-Tenant).

      **الجزء الأول (code-reviewer-carag) — Architectural Review:**

      1. اقرأ `docs/multitenant/audit.md`:
         - هل يغطي الـ 35 model؟
         - هل كل model له قرار واضح (scoped/refused/reason)؟

      2. فحص 5 models عشوائياً (Supplier, Part, WorkOrder, Customer, Employee):
         ```bash
         cd /Users/ahmad/Herd/carag-v2
         grep -l "use BelongsToTenant\|TenantScope" app/Models/Supplier.php app/Models/Part.php app/Models/WorkOrder.php app/Models/Customer.php app/Models/Employee.php
         ```
         هل كل واحد يستخدم scoping pattern؟

      3. **Cross-tenant attack simulation:**
         - في `SupplierTenantIsolationTest`، تأكد أن الـ test ينشئ بيانات في tenantA و tenantB و يتأكد أن supplier من A غير مرئي في B queries.
         - تحقق أن الـ test يستخدم `actingAs` أو explicit `Tenant::current()` بشكل صحيح.

      4. **سجلتهاكات المسار:**
         Track E لا يجب يلمس resources/js/، composer.json، routes/web.php، أو app/Services/AI/.

      **الجزء الثاني (tester-carag) — Runtime Verification:**

      1. **Run tests:**
         ```bash
         cd /Users/ahmad/Herd/carag-v2 && php artisan test --filter=TenantIsolation 2>&1 | tail -20
         ```
         كل الـ tests لازم PASS.

      2. **Full suite regression:**
         ```bash
         cd /Users/ahmad/Herd/carag-v2 && php artisan test 2>&1 | tail -10
         ```
         عدد passing لا يقل عن baseline (106 حسب assessment).

      3. **عدد TenantIsolation tests:**
         ```bash
         find /Users/ahmad/Herd/carag-v2/tests/Feature/TenantIsolation -name "*.php" 2>&1 | wc -l
         ```
         ≥ 10 tests.

      **PASS criteria:** كل الفحوصات تنجح.  
      **FAIL criteria:** أي فشل أو عدد tests أقل من baseline.

